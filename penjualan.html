<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penjualan - Kasir Toko Kukuh</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">

<h2>🛒 Penjualan</h2>

<label>Pilih Barang</label>
<select id="barang"></select>

<label>Jumlah</label>
<input type="number" id="jumlah" value="1" min="1">

<button onclick="tambah()">➕ Tambah ke Keranjang</button>

<hr>

<h3>Keranjang Belanja</h3>

<div id="keranjang"></div>

<h2 id="total">
Total : Rp 0
</h2>

<hr>

<h3>Pembayaran</h3>

<input
type="number"
id="bayar"
placeholder="Masukkan jumlah pembayaran">

<button onclick="hitungKembalian()">
💵 Hitung Kembalian
</button>

<h2 id="kembalian">
Kembalian : Rp 0
</h2>

<button onclick="selesaiTransaksi()">
✅ Selesaikan Transaksi
</button>

<br><br>

<button onclick="window.location='dashboard.html'">
⬅ Kembali ke Dashboard
</button>

</div>

<script>let daftarBarang = JSON.parse(localStorage.getItem("barang")) || [];
let keranjang = [];

const select = document.getElementById("barang");

function muatBarang() {
    select.innerHTML = "";

    if (daftarBarang.length === 0) {
        let option = document.createElement("option");
        option.text = "-- Belum ada barang --";
        option.value = "";
        select.add(option);
        return;
    }

    daftarBarang.forEach((b, i) => {
        let option = document.createElement("option");
        option.value = i;
        option.text = b.nama + " - Rp " + b.hargaJual;
        select.add(option);
    });
}

function tambah() {

    if (daftarBarang.length === 0) {
        alert("Belum ada data barang.");
        return;
    }

    const index = Number(select.value);
    const jumlah = Number(document.getElementById("jumlah").value);

    const barang = daftarBarang[index];

    keranjang.push({
        nama: barang.nama,
        harga: Number(barang.hargaJual),
        jumlah: jumlah
    });

    tampilkan();
}

function tampilkan() {

    let html = "";
    let total = 0;

    keranjang.forEach(item => {

        const subtotal = item.harga * item.jumlah;
        total += subtotal;

        html += `
        <div style="border:1px solid #ddd;padding:8px;margin:8px 0;border-radius:8px;">
            <b>${item.nama}</b><br>
            ${item.jumlah} × Rp ${item.harga}<br>
            <b>Subtotal : Rp ${subtotal}</b>
        </div>
        `;
    });

    document.getElementById("keranjang").innerHTML = html;
    document.getElementById("total").innerHTML = "Total : Rp " + total;
}

muatBarang();function hitungKembalian() {

    let total = 0;

    keranjang.forEach(item => {
        total += item.harga * item.jumlah;
    });

    const bayar = Number(document.getElementById("bayar").value);

    if (bayar < total) {
        alert("Uang pembayaran kurang!");
        return;
    }

    const kembali = bayar - total;

    document.getElementById("kembalian").innerHTML =
        "Kembalian : Rp " + kembali;
}

function selesaiTransaksi() {

    if (keranjang.length === 0) {
        alert("Keranjang masih kosong!");
        return;
    }

    alert("Transaksi berhasil disimpan.");

    keranjang = [];

    document.getElementById("keranjang").innerHTML = "";
    document.getElementById("total").innerHTML = "Total : Rp 0";
    document.getElementById("kembalian").innerHTML = "Kembalian : Rp 0";
    document.getElementById("bayar").value = "";
    document.getElementById("jumlah").value = "1";
}
</script>

</body>
</html>
