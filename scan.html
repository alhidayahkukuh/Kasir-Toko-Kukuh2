<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Barcode - Kasir Toko Kukuh</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

<h2>📷 Scan Barcode</h2>

<p>Tekan tombol di bawah untuk mulai memindai barcode.</p>

<button onclick="mulaiScan()">
Mulai Scan
</button>

<h3>Hasil Scan</h3>

<input
type="text"
id="hasilBarcode"
placeholder="Barcode akan muncul di sini"
readonly>

<br><br>

<button onclick="window.location.href='dashboard.html'">
⬅ Kembali ke Dashboard
</button>

</div>

<script>

function mulaiScan() {

    document.querySelector(".login-box").innerHTML +=
    '<div id="reader" style="width:300px;margin:auto;"></div>';

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        function(decodedText) {

    document.getElementById("hasilBarcode").value = decodedText;

    localStorage.setItem("barcodeHasil", decodedText);

    html5QrCode.stop().then(() => {

        window.location.href = "penjualan.html";

    }).catch(err => {
        console.log(err);
        window.location.href = "penjualan.html";
    });

        },
        function(errorMessage) {
            // Abaikan error saat proses scan
        }
    );
}

</script>
<script src="https://unpkg.com/html5-qrcode"></script>
</body>
</html>
