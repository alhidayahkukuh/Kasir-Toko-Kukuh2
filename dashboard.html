<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kasir Toko Kukuh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
    <h1>🏪 Kasir Toko Kukuh</h1>
    <h3>Dashboard</h3>

    <button onclick="menu('penjualan')">🛒 Penjualan</button>
    <button onclick="menu('barang')">📦 Data Barang</button>
    <button onclick="menu('barcode')">📷 Scan Barcode</button>
    <button onclick="menu('laporan')">📊 Laporan</button>
    <button onclick="menu('pengaturan')">⚙️ Pengaturan</button>

    <br><br>

    <button onclick="logout()">🚪 Keluar</button>
</div>

<script>
if (localStorage.getItem("login") !== "true") {
    window.location.href = "index.html";
}

function menu(nama){

if(nama=="barang"){
window.location.href="barang.html";
}
else if(nama=="penjualan"){
window.location.href="penjualan.html";
}
else if(nama=="barcode"){
window.location.href="scan.html";
}
else{
alert("Menu "+nama+" segera dibuat.");
}

}

function logout() {
    localStorage.removeItem("login");
    window.location.href = "index.html";
}
</script>

</body>
</html>
